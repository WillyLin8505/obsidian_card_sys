<!DOCTYPE html>
<html>
<head><title>LZ-String Decompressor</title></head>
<body>
<h2>LZ-String Decompressed Output</h2>
<pre id="output" style="white-space:pre-wrap; background:#f0f0f0; padding:16px; border-radius:8px; font-size:14px;"></pre>
<script>
const keyStrBase64 = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=";
function getBaseValue(a,c){return a.indexOf(c)}
function _decompress(length,resetValue,getNextValue){const dictionary=[];let enlargeIn=4;let dictSize=4;let numBits=3;let entry="";let result=[];let w;let bits,resb,maxpower,power;let c;const data={val:getNextValue(0),position:resetValue,index:1};for(let i=0;i<3;i++){dictionary[i]=i}bits=0;maxpower=Math.pow(2,2);power=1;while(power!==maxpower){resb=data.val&data.position;data.position>>=1;if(data.position===0){data.position=resetValue;data.val=getNextValue(data.index++)}bits|=(resb>0?1:0)*power;power<<=1}switch(bits){case 0:bits=0;maxpower=Math.pow(2,8);power=1;while(power!==maxpower){resb=data.val&data.position;data.position>>=1;if(data.position===0){data.position=resetValue;data.val=getNextValue(data.index++)}bits|=(resb>0?1:0)*power;power<<=1}c=String.fromCharCode(bits);break;case 1:bits=0;maxpower=Math.pow(2,16);power=1;while(power!==maxpower){resb=data.val&data.position;data.position>>=1;if(data.position===0){data.position=resetValue;data.val=getNextValue(data.index++)}bits|=(resb>0?1:0)*power;power<<=1}c=String.fromCharCode(bits);break;case 2:return""}dictionary[3]=c;w=c;result.push(c);while(true){if(data.index>length)return"";bits=0;maxpower=Math.pow(2,numBits);power=1;while(power!==maxpower){resb=data.val&data.position;data.position>>=1;if(data.position===0){data.position=resetValue;data.val=getNextValue(data.index++)}bits|=(resb>0?1:0)*power;power<<=1}switch(c=bits){case 0:bits=0;maxpower=Math.pow(2,8);power=1;while(power!==maxpower){resb=data.val&data.position;data.position>>=1;if(data.position===0){data.position=resetValue;data.val=getNextValue(data.index++)}bits|=(resb>0?1:0)*power;power<<=1}dictionary[dictSize++]=String.fromCharCode(bits);c=dictSize-1;enlargeIn--;break;case 1:bits=0;maxpower=Math.pow(2,16);power=1;while(power!==maxpower){resb=data.val&data.position;data.position>>=1;if(data.position===0){data.position=resetValue;data.val=getNextValue(data.index++)}bits|=(resb>0?1:0)*power;power<<=1}dictionary[dictSize++]=String.fromCharCode(bits);c=dictSize-1;enlargeIn--;break;case 2:return result.join("")}if(enlargeIn===0){enlargeIn=Math.pow(2,numBits);numBits++}if(dictionary[c]){entry=dictionary[c]}else{if(c===dictSize){entry=w+w.charAt(0)}else{return null}}result.push(entry);dictionary[dictSize++]=w+entry.charAt(0);enlargeIn--;if(enlargeIn===0){enlargeIn=Math.pow(2,numBits);numBits++}w=entry}}
function decompressFromBase64(input){if(input==null)return"";if(input==="")return null;return _decompress(input.length,32,function(index){return getBaseValue(keyStrBase64,input.charAt(index))})}

const compressed = "N4IgLgngDgpiBcIYA8DGBDANgSwCYCd0B3EAGhADcZ8BnbAewDsEAmcm+gV31TkQAswYKDXgB6MQHNsYfpwBGAOlT0AtmIBeNCtlQbs6RmPry6uA4wC0KDDgLFLUTJ2lH8MTDHQ0YNMWHRJMRZFAEYADkUWMiRPVRhGMBoEAG0AXXJ0KCgAZQCwPlBJfDwc7A0+Rk5MTHIdGCIAIXRUAGtirkZcAGF6THp8BBAAYgAzcYmQAF8poA===";

const result = decompressFromBase64(compressed);
const el = document.getElementById("output");

if (result && result.length > 0) {
  try {
    const parsed = JSON.parse(result);
    el.textContent = JSON.stringify(parsed, null, 2);
  } catch(e) {
    el.textContent = "Not valid JSON. Raw output:\n" + result;
  }
} else {
  el.textContent = "LZ-String decompression returned null/empty.";
}
</script>
</body>
</html>
